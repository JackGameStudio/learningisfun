<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LearningIsFun - 像素游戏风</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #1a1c2c;
      --bg-mid: #333c57;
      --stone: #7f7f7f;
      --iron: #d4d4d4;
      --gold: #f5d742;
      --diamond: #4ae3e3;
      --emerald: #3de366;
      --red: #df4759;
      --text: #f4f4f4;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Press Start 2P', cursive;
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
      image-rendering: pixelated;
    }
    
    /* 像素边框效果 */
    .pixel-border {
      border: 4px solid var(--text);
      box-shadow: 
        4px 4px 0 var(--bg-mid),
        inset -4px -4px 0 var(--bg-mid);
    }
    
    .pixel-btn {
      background: var(--bg-mid);
      border: 4px solid var(--text);
      padding: 12px 24px;
      font-family: inherit;
      font-size: 12px;
      color: var(--text);
      cursor: pointer;
      transition: transform 0.1s;
      image-rendering: pixelated;
    }
    
    .pixel-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 var(--bg-mid);
    }
    
    .pixel-btn:active {
      transform: translate(0, 0);
      box-shadow: none;
    }
    
    /* 导航栏 */
    nav {
      background: var(--bg-mid);
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 4px solid var(--text);
    }
    
    .logo {
      font-size: 16px;
      color: var(--gold);
      text-shadow: 2px 2px 0 var(--bg-dark);
    }
    
    .nav-items {
      display: flex;
      gap: 16px;
    }
    
    .nav-item {
      font-size: 10px;
      padding: 8px 16px;
      background: transparent;
      border: 2px solid var(--text);
      color: var(--text);
      cursor: pointer;
    }
    
    .nav-item:hover {
      background: var(--text);
      color: var(--bg-dark);
    }
    
    /* 主内容区 */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
    }
    
    /* 玩家状态卡片 */
    .player-card {
      background: var(--bg-mid);
      padding: 20px;
      margin-bottom: 24px;
    }
    
    .player-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .player-name {
      font-size: 14px;
      color: var(--diamond);
    }
    
    .player-level {
      font-size: 10px;
      color: var(--gold);
    }
    
    /* 经验条 - 像素风格 */
    .exp-bar-container {
      background: var(--bg-dark);
      border: 2px solid var(--stone);
      height: 24px;
      position: relative;
    }
    
    .exp-bar-fill {
      background: var(--emerald);
      height: 100%;
      width: 65%;
      transition: width 0.5s steps(20);
      position: relative;
    }
    
    .exp-bar-fill::after {
      content: '';
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: var(--text);
      animation: blink 1s infinite;
    }
    
    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }
    
    .exp-text {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 8px;
      color: var(--text);
    }
    
    /* 升级路线 */
    .upgrade-path {
      display: flex;
      justify-content: space-between;
      margin: 24px 0;
      padding: 16px;
      background: var(--bg-dark);
    }
    
    .upgrade-item {
      text-align: center;
      opacity: 0.4;
      transition: opacity 0.3s;
    }
    
    .upgrade-item.active {
      opacity: 1;
    }
    
    .upgrade-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    
    .upgrade-label {
      font-size: 8px;
    }
    
    /* 学习卡片 */
    .learn-section {
      margin-top: 24px;
    }
    
    .section-title {
      font-size: 12px;
      color: var(--gold);
      margin-bottom: 16px;
      text-shadow: 2px 2px 0 var(--bg-dark);
    }
    
    .word-card {
      background: var(--bg-mid);
      padding: 32px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .word-card:hover {
      transform: scale(1.02);
    }
    
    .word-main {
      font-size: 24px;
      color: var(--text);
      margin-bottom: 8px;
    }
    
    .word-phonetic {
      font-size: 10px;
      color: var(--stone);
      margin-bottom: 16px;
    }
    
    .word-meaning {
      font-size: 12px;
      color: var(--diamond);
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .word-card.revealed .word-meaning {
      opacity: 1;
    }
    
    /* 进度统计 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 24px;
    }
    
    .stat-box {
      background: var(--bg-mid);
      padding: 16px;
      text-align: center;
    }
    
    .stat-value {
      font-size: 20px;
      color: var(--emerald);
      margin-bottom: 8px;
    }
    
    .stat-label {
      font-size: 8px;
      color: var(--stone);
    }
    
    /* 动画 */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    
    .float-anim {
      animation: float 2s ease-in-out infinite;
    }
    
    /* 响应式 */
    @media (max-width: 600px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }
      
      .upgrade-path {
        flex-wrap: wrap;
        gap: 16px;
      }
      
      .upgrade-item {
        flex: 1 1 30%;
      }
    }
  </style>
</head>
<body>
  <nav>
    <div class="logo">🎮 LearningIsFun</div>
    <div class="nav-items">
      <button class="nav-item">📚 词库</button>
      <button class="nav-item">📊 统计</button>
      <button class="nav-item">⚙️ 设置</button>
    </div>
  </nav>
  
  <main>
    <!-- 玩家状态 -->
    <div class="player-card pixel-border">
      <div class="player-header">
        <span class="player-name">👤 玩家小明</span>
        <span class="player-level">⭐ Lv.12 矿工</span>
      </div>
      <div class="exp-bar-container">
        <div class="exp-bar-fill"></div>
        <span class="exp-text">650/1000 XP</span>
      </div>
    </div>
    
    <!-- 升级路线 -->
    <div class="upgrade-path pixel-border">
      <div class="upgrade-item">
        <div class="upgrade-icon">🪨</div>
        <div class="upgrade-label">圆石</div>
      </div>
      <div class="upgrade-item active">
        <div class="upgrade-icon">🧱</div>
        <div class="upgrade-label">泥土</div>
      </div>
      <div class="upgrade-item">
        <div class="upgrade-icon">🪵</div>
        <div class="upgrade-label">橡木</div>
      </div>
      <div class="upgrade-item">
        <div class="upgrade-icon">🔩</div>
        <div class="upgrade-label">铁块</div>
      </div>
      <div class="upgrade-item">
        <div class="upgrade-icon">💎</div>
        <div class="upgrade-label">钻石</div>
      </div>
      <div class="upgrade-item">
        <div class="upgrade-icon">💚</div>
        <div class="upgrade-label">绿宝石</div>
      </div>
    </div>
    
    <!-- 学习卡片 -->
    <div class="learn-section">
      <div class="section-title">📖 今日学习</div>
      <div class="word-card pixel-border" onclick="this.classList.toggle('revealed')">
        <div class="word-main float-anim">ADVENTURE</div>
        <div class="word-phonetic">/ədˈventʃər/</div>
        <div class="word-meaning">n. 冒险，奇遇</div>
      </div>
      
      <div style="display: flex; gap: 16px; margin-top: 16px; justify-content: center;">
        <button class="pixel-btn" style="background: var(--red);">❌ 不认识</button>
        <button class="pixel-btn" style="background: var(--gold);">🤔 有点熟</button>
        <button class="pixel-btn" style="background: var(--emerald);">✅ 认识</button>
      </div>
    </div>
    
    <!-- 统计 -->
    <div class="stats-grid">
      <div class="stat-box pixel-border">
        <div class="stat-value">735</div>
        <div class="stat-label">总词数</div>
      </div>
      <div class="stat-box pixel-border">
        <div class="stat-value">42</div>
        <div class="stat-label">今日新学</div>
      </div>
      <div class="stat-box pixel-border">
        <div class="stat-value">89%</div>
        <div class="stat-label">正确率</div>
      </div>
    </div>
  </main>
  
  <script>
    // 简单交互：升级路线点击
    document.querySelectorAll('.upgrade-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.upgrade-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
      });
    });
  </script>
</body>
</html>
