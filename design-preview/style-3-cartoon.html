<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearningIsFun - 卡通手绘风</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap');

    :root {
      --bg: #fff8e7;
      --card: #ffffff;
      --pencil: #2d3436;
      --pencil-light: #636e72;
      --accent-pink: #fd79a8;
      --accent-yellow: #ffeaa7;
      --accent-blue: #74b9ff;
      --accent-green: #55efc4;
      --accent-orange: #fab1a0;
      --accent-purple: #a29bfe;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Patrick Hand', cursive;
      background: var(--bg);
      color: var(--pencil);
      min-height: 100vh;
      min-height: 100dvh;
      background-image: 
        radial-gradient(circle at 20% 80%, rgba(253, 121, 168, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(116, 185, 255, 0.08) 0%, transparent 50%);
    }

    /* 手绘边框效果 */
    .sketch-border {
      border: 3px solid var(--pencil);
      border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
      box-shadow: 2px 3px 0 var(--pencil);
    }

    .sketch-border-sm {
      border: 2px solid var(--pencil);
      border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
      box-shadow: 2px 2px 0 var(--pencil);
    }

    /* === 顶部 === */
    .top-header {
      padding: calc(var(--safe-top) + 10px) 20px 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .top-left h1 {
      font-size: 28px;
      font-weight: normal;
    }

    .top-left p {
      font-size: 18px;
      color: var(--pencil-light);
      margin-top: 2px;
    }

    .avatar-circle {
      width: 56px;
      height: 56px;
      background: var(--accent-yellow);
      border: 3px solid var(--pencil);
      border-radius: 50% 45% 50% 50% / 45% 50% 50% 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 3px 3px 0 var(--pencil);
    }

    /* === 笔记风格进度 === */
    .note-progress {
      margin: 16px 20px;
      background: var(--card);
      padding: 20px;
      position: relative;
    }

    .note-progress::before {
      content: '📝';
      position: absolute;
      top: -14px;
      left: 20px;
      font-size: 24px;
    }

    .note-title {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .note-stats {
      display: flex;
      gap: 16px;
      font-size: 18px;
      color: var(--pencil-light);
    }

    .note-stats strong { color: var(--pencil); }

    /* === 卡通等级 === */
    .level-stickers {
      display: flex;
      gap: 10px;
      margin: 0 20px;
      overflow-x: auto;
      padding: 8px 0;
      -webkit-overflow-scrolling: touch;
    }

    .level-stickers::-webkit-scrollbar { display: none; }

    .sticker {
      flex-shrink: 0;
      width: 60px;
      height: 70px;
      background: var(--card);
      border: 2px solid var(--pencil);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      box-shadow: 2px 2px 0 var(--pencil);
      transform: rotate(-2deg);
      transition: transform 0.2s;
    }

    .sticker:nth-child(even) { transform: rotate(2deg); }
    .sticker:hover { transform: rotate(0deg) scale(1.05); }

    .sticker.done { background: var(--accent-green); }
    .sticker.current { background: var(--accent-yellow); }
    .sticker.locked { opacity: 0.5; }

    .sticker-icon { font-size: 24px; }
    .sticker-label { font-size: 12px; }

    /* === 单词卡片 === */
    .section-header {
      padding: 24px 20px 12px;
      font-size: 22px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .word-card {
      margin: 0 20px;
      background: var(--card);
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.15s;
    }

    .word-card:hover { transform: scale(1.02) rotate(0.5deg); }

    .word-main {
      font-size: 44px;
      line-height: 1.2;
      position: relative;
      display: inline-block;
    }

    .word-main::before {
      content: '✏️';
      position: absolute;
      top: -20px;
      right: -24px;
      font-size: 20px;
    }

    .word-pron {
      font-size: 20px;
      color: var(--pencil-light);
      margin-top: 4px;
    }

    .word-def {
      font-size: 26px;
      color: var(--accent-pink);
      margin-top: 16px;
      min-height: 32px;
      opacity: 0;
      transform: scale(0.8);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .word-card.revealed .word-def {
      opacity: 1;
      transform: scale(1);
    }

    .word-morph {
      font-size: 16px;
      color: var(--pencil-light);
      margin-top: 10px;
      opacity: 0;
      transition: opacity 0.3s 0.1s;
    }

    .word-card.revealed .word-morph { opacity: 1; }

    .tap-hint {
      font-size: 16px;
      color: var(--pencil-light);
      margin-top: 14px;
      background: var(--accent-yellow);
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
    }

    .word-card.revealed .tap-hint { display: none; }

    /* === 按钮 === */
    .btn-row {
      display: flex;
      gap: 10px;
      margin: 16px 20px 0;
    }

    .fun-btn {
      flex: 1;
      padding: 14px 8px;
      border: 2px solid var(--pencil);
      border-radius: 12px;
      font-family: 'Patrick Hand', cursive;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 2px 2px 0 var(--pencil);
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .fun-btn:active {
      transform: translate(2px, 2px);
      box-shadow: none;
    }

    .btn-no { background: #ffcccc; }
    .btn-some { background: #fff3cd; }
    .btn-yes { background: #d4edda; }

    /* === 统计 === */
    .stats-row {
      display: flex;
      gap: 12px;
      margin: 20px 20px;
    }

    .stat-box {
      flex: 1;
      background: var(--card);
      padding: 16px 12px;
      text-align: center;
      border: 2px solid var(--pencil);
      border-radius: 10px;
      box-shadow: 2px 2px 0 var(--pencil);
    }

    .stat-num {
      font-size: 32px;
    }

    .stat-lbl {
      font-size: 14px;
      color: var(--pencil-light);
    }

    .stat-num.s1 { color: #e84393; }
    .stat-num.s2 { color: #00b894; }
    .stat-num.s3 { color: #0984e3; }

    /* === 底部 === */
    .tab-bar {
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
      padding-bottom: calc(var(--safe-bottom) + 12px);
      background: var(--card);
      border-top: 2px dashed var(--pencil-light);
      margin-top: 20px;
    }

    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      font-size: 13px;
      color: var(--pencil-light);
      cursor: pointer;
    }

    .tab-item.active { color: var(--pencil); }
    .tab-icon { font-size: 24px; }

    /* 装饰 */
    .deco-star {
      position: fixed;
      font-size: 20px;
      opacity: 0.6;
      z-index: -1;
    }
  </style>
</head>
<body>

  <!-- 装饰 -->
  <div class="deco-star" style="top: 10%; left: 5%;">⭐</div>
  <div class="deco-star" style="top: 30%; right: 8%;">✨</div>
  <div class="deco-star" style="bottom: 20%; left: 10%;">🎈</div>

  <!-- 顶部 -->
  <div class="top-header">
    <div class="top-left">
      <h1>🎒 学习日记</h1>
      <p>小明同学的学习笔记</p>
    </div>
    <div class="avatar-circle">👦</div>
  </div>

  <!-- 进度笔记 -->
  <div class="note-progress sketch-border">
    <div class="note-title">📖 今日任务</div>
    <div class="note-stats">
      <span>已学: <strong>13</strong> 词</span>
      <span>目标: <strong>20</strong> 词</span>
      <span>进度: <strong>65%</strong></span>
    </div>
  </div>

  <!-- 等级贴纸 -->
  <div class="level-stickers">
    <div class="sticker done">
      <div class="sticker-icon">🪨</div>
      <div class="sticker-label">圆石</div>
    </div>
    <div class="sticker done">
      <div class="sticker-icon">🧱</div>
      <div class="sticker-label">泥土</div>
    </div>
    <div class="sticker done">
      <div class="sticker-icon">🪵</div>
      <div class="sticker-label">橡木</div>
    </div>
    <div class="sticker current">
      <div class="sticker-icon">🔩</div>
      <div class="sticker-label">铁块</div>
    </div>
    <div class="sticker locked">
      <div class="sticker-icon">💎</div>
      <div class="sticker-label">钻石</div>
    </div>
    <div class="sticker locked">
      <div class="sticker-icon">💚</div>
      <div class="sticker-label">绿宝石</div>
    </div>
  </div>

  <!-- 单词卡片 -->
  <div class="section-header">✏️ 今日单词</div>

  <div class="word-card sketch-border" onclick="this.classList.toggle('revealed')">
    <div class="word-main">Adventure</div>
    <div class="word-pron">/ədˈventʃər/</div>
    <div class="word-def">n. 冒险，奇遇</div>
    <div class="word-morph">ad(向) + vent(来) + ure</div>
    <div class="tap-hint">👆 点我看看中文</div>
  </div>

  <!-- 按钮 -->
  <div class="btn-row">
    <button class="fun-btn btn-no">😵 不认识</button>
    <button class="fun-btn btn-some">🤔 有点印象</button>
    <button class="fun-btn btn-yes">😎 认识啦</button>
  </div>

  <!-- 统计 -->
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-num s1">735</div>
      <div class="stat-lbl">📚 总词汇</div>
    </div>
    <div class="stat-box">
      <div class="stat-num s2">7</div>
      <div class="stat-lbl">🔥 连续天数</div>
    </div>
    <div class="stat-box">
      <div class="stat-num s3">89%</div>
      <div class="stat-lbl">✨ 正确率</div>
    </div>
  </div>

  <!-- 底部 -->
  <div class="tab-bar">
    <div class="tab-item active">
      <div class="tab-icon">📖</div>
      <span>学习</span>
    </div>
    <div class="tab-item">
      <div class="tab-icon">📚</div>
      <span>词库</span>
    </div>
    <div class="tab-item">
      <div class="tab-icon">🎯</div>
      <span>目标</span>
    </div>
    <div class="tab-item">
      <div class="tab-icon">👤</div>
      <span>我的</span>
    </div>
  </div>

  <script>
    document.querySelectorAll('.tab-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
      });
    });
  </script>
</body>
</html>
